name: Pipeline CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    name: Verificação (Lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar Ruff
        run: pip install ruff
      - name: Analisar código e formatação
        run: ruff check src/ tests/ && ruff format --check src/ tests/

  test:
    name: Testes
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar dependências
        run: pip install -r requirements.txt
      - name: Rodar testes
        run: pytest tests/ -v --tb=short
        env:
          PYTHONPATH: ${{ github.workspace }}/src

  build:
    name: Compilação
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar dependências
        run: pip install -r requirements.txt
      - name: Validar import do módulo
        run: python -c "from src.calculator import add; print(add(1,2))"
